name: Generate Datas

on:
  push: # Esto hace que se ejecute inmediatamente al guardar
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write # Permiso obligatorio para que GitHub guarde la imagen

jobs:
  build:
    name: Jobs's name
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: iGesielR
          
          # Esto genera el SVG del juego con una paleta de colores oscura
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=#E4405F&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353
            
      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
