name: Generate Datas

on:
  schedule: # Se ejecuta cada 12 horas automáticamente
    - cron: "0 */12 * * *"
  workflow_dispatch: # Te permite ejecutarlo manualmente desde la pestaña Actions

jobs:
  build:
    name: Jobs's name
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          
          github_user_name: iGesielR
          
          # Esto genera el SVG del juego con una paleta de colores oscura y bordes morados/rosas
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=#E4405F&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353
            
      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
